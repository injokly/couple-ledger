<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>빠른 입력 — 우리 가계</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root {
    --bg: #000000;
    --sheet: #17181B;
    --bg-elev: #18191C;
    --bg-elev-2: #212226;
    --bg-chip: #2A2B2F;
    --bg-chip-hover: #33343A;
    --text: #FFFFFF;
    --text-2: #D4D6DA;
    --text-3: #8B8E95;
    --text-4: #5C5F66;
    --border: #2B2D31;
    --border-soft: #1F2024;
    --up: #EB4D3D;
    --up-soft: rgba(235, 77, 61, 0.15);
    --down: #3182F6;
    --accent: #3182F6;
    --success: #1CB572;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  button { font-family: inherit; border: none; background: none; color: inherit; cursor: pointer; }

  html, body {
    background: #0B0C0E;
    font-family: 'Pretendard', -apple-system, sans-serif;
    color: var(--text);
    min-height: 100vh;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background: radial-gradient(ellipse at top, #1A1C20 0%, #050507 100%);
  }

  .device {
    width: 100%;
    max-width: 420px;
    background: var(--bg);
    border-radius: 44px;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 40px 80px rgba(0,0,0,0.6);
    position: relative;
    border: 6px solid #1A1B1E;
    height: 900px;
  }

  /* ── Background (home peek, dimmed) ── */
  .peek {
    position: absolute;
    inset: 0;
    filter: blur(4px) brightness(0.5);
    pointer-events: none;
  }
  .peek-status {
    padding: 18px 26px 10px;
    display: flex;
    justify-content: space-between;
    font-size: 15px;
    font-weight: 600;
  }
  .peek-header {
    padding: 14px 22px 8px;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.03em;
  }
  .peek-card {
    margin: 14px;
    background: var(--bg-elev);
    border-radius: 22px;
    padding: 24px 22px;
  }
  .peek-num {
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.04em;
    margin-top: 8px;
  }
  .peek-label {
    font-size: 14px;
    color: var(--text-3);
  }

  /* ── Backdrop ── */
  .backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    z-index: 10;
    animation: fadeIn 0.3s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }

  /* ── Bottom Sheet ── */
  .sheet {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--sheet);
    border-radius: 28px 28px 0 0;
    z-index: 20;
    display: flex;
    flex-direction: column;
    animation: slideUp 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 93%;
  }
  @keyframes slideUp {
    from { transform: translateY(100%) }
    to { transform: translateY(0) }
  }

  .handle-area {
    padding: 8px 0 4px;
    display: flex;
    justify-content: center;
  }
  .handle {
    width: 40px;
    height: 4px;
    border-radius: 100px;
    background: var(--bg-chip);
  }

  /* ── Sheet Header ── */
  .sheet-head {
    display: grid;
    grid-template-columns: 44px 1fr 100px;
    align-items: center;
    padding: 10px 14px 6px;
  }
  .close-btn {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-2);
    border-radius: 50%;
  }
  .close-btn:hover { background: var(--bg-elev-2); }
  .close-btn svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2; }
  .sheet-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.03em;
    text-align: center;
  }
  .date-chip {
    justify-self: end;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 12px;
    background: var(--bg-elev-2);
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-2);
    letter-spacing: -0.02em;
  }
  .date-chip svg { width: 13px; height: 13px; stroke: currentColor; stroke-width: 2; fill: none; }

  /* ── Type Toggle ── */
  .type-toggle {
    margin: 8px 16px 0;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    background: var(--bg-elev);
    border-radius: 12px;
    padding: 4px;
    position: relative;
  }
  .type-btn {
    padding: 10px 0;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text-3);
    border-radius: 9px;
    transition: all 0.2s;
  }
  .type-btn.active {
    background: var(--bg-chip);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .type-btn.active.expense { color: var(--text); }

  /* ── Amount Display ── */
  .amount-wrap {
    padding: 28px 24px 12px;
    text-align: center;
  }
  .amount-display {
    display: inline-flex;
    align-items: baseline;
    gap: 4px;
    font-variant-numeric: tabular-nums;
  }
  .amount-number {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -0.05em;
    color: var(--text);
    line-height: 1;
  }
  .amount-number.placeholder { color: var(--text-4); font-weight: 600; }
  .amount-won {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text-2);
  }
  .amount-cursor {
    display: inline-block;
    width: 2px;
    height: 40px;
    background: var(--accent);
    margin-left: 2px;
    transform: translateY(-2px);
    animation: blink 1.1s steps(2) infinite;
  }
  @keyframes blink {
    0%, 50% { opacity: 1 }
    50.01%, 100% { opacity: 0 }
  }
  .amount-hint {
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-4);
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .amount-hint b {
    color: var(--text-3);
    font-weight: 600;
  }

  /* ── Memo ── */
  .memo-wrap {
    padding: 4px 22px 16px;
    text-align: center;
  }
  .memo-input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    padding: 10px 0;
    font-family: inherit;
    letter-spacing: -0.02em;
  }
  .memo-input::placeholder { color: var(--text-4); }

  /* ── Divider ── */
  .div {
    height: 1px;
    background: var(--border-soft);
    margin: 0 16px;
  }

  /* ── Category Strip ── */
  .cat-section {
    padding: 14px 0 10px;
  }
  .section-label {
    font-size: 12px;
    color: var(--text-3);
    font-weight: 600;
    letter-spacing: -0.01em;
    padding: 0 22px;
    margin-bottom: 8px;
  }
  .cat-strip {
    display: flex;
    gap: 8px;
    padding: 2px 16px 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .cat-strip::-webkit-scrollbar { display: none; }
  .cat-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 14px;
    background: var(--bg-elev);
    border-radius: 100px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-2);
    letter-spacing: -0.02em;
    white-space: nowrap;
    flex-shrink: 0;
    border: 1.5px solid transparent;
    transition: all 0.15s;
  }
  .cat-chip:hover { background: var(--bg-chip); }
  .cat-chip.selected {
    background: var(--bg-chip);
    border-color: var(--text);
    color: var(--text);
  }
  .cat-chip .emoji { font-size: 15px; }

  /* ── Meta Row ── */
  .meta-row {
    display: grid;
    grid-template-columns: 24px 1fr auto 16px;
    gap: 12px;
    align-items: center;
    padding: 14px 22px;
    cursor: pointer;
  }
  .meta-row:hover { background: rgba(255,255,255,0.02); }
  .meta-icon {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-3);
  }
  .meta-icon svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .meta-label {
    font-size: 14px;
    color: var(--text-3);
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .meta-value {
    font-size: 14px;
    color: var(--text);
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .meta-chev {
    color: var(--text-4);
    font-size: 16px;
    line-height: 1;
  }

  /* ── Keypad ── */
  .keypad {
    margin-top: 6px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 2px;
    padding: 8px 8px 4px;
  }
  .key {
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    font-weight: 500;
    color: var(--text);
    border-radius: 10px;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
    transition: background 0.1s;
    font-family: inherit;
  }
  .key:hover { background: var(--bg-elev); }
  .key:active { background: var(--bg-chip); }
  .key.small { font-size: 20px; font-weight: 600; }
  .key.icon svg { width: 26px; height: 26px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

  /* ── Save ── */
  .save-wrap {
    padding: 10px 16px 22px;
    background: var(--sheet);
  }
  .save-btn {
    width: 100%;
    height: 56px;
    background: var(--accent);
    color: #FFFFFF;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.03em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s;
    box-shadow: 0 4px 16px rgba(49,130,246,0.3);
  }
  .save-btn:hover { background: #2973DC; }
  .save-btn:active { transform: scale(0.99); }
  .save-btn.disabled {
    background: var(--bg-elev);
    color: var(--text-4);
    box-shadow: none;
    cursor: not-allowed;
  }

  .save-hint {
    text-align: center;
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-4);
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .save-hint b {
    color: var(--text-3);
    font-weight: 600;
  }

  .home-indicator {
    width: 140px;
    height: 5px;
    background: var(--text);
    border-radius: 100px;
    margin: 0 auto 8px;
    opacity: 0.9;
  }

</style>
</head>
<body>
  <div class="device">

    <!-- Dimmed home peek in background -->
    <div class="peek">
      <div class="peek-status">
        <span>9:41</span>
        <span>●●●●</span>
      </div>
      <div class="peek-header">우리 가계 ∨</div>
      <div class="peek-card">
        <div class="peek-label">총 순자산</div>
        <div class="peek-num">324,580,200원</div>
      </div>
    </div>

    <!-- Backdrop -->
    <div class="backdrop"></div>

    <!-- Bottom Sheet -->
    <div class="sheet">

      <!-- Drag handle -->
      <div class="handle-area">
        <div class="handle"></div>
      </div>

      <!-- Header -->
      <div class="sheet-head">
        <button class="close-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round">
            <path d="M6 6l12 12M18 6L6 18"/>
          </svg>
        </button>
        <div class="sheet-title">거래 기록</div>
        <div class="date-chip">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          오늘 · 4/21
        </div>
      </div>

      <!-- Type toggle -->
      <div class="type-toggle">
        <button class="type-btn active expense">지출</button>
        <button class="type-btn">수입</button>
        <button class="type-btn">이체</button>
      </div>

      <!-- Amount Display -->
      <div class="amount-wrap">
        <div class="amount-display">
          <span class="amount-number">12,500</span>
          <span class="amount-won">원</span>
          <span class="amount-cursor"></span>
        </div>
        <div class="amount-hint">이번 달 식비 <b>총 487,300원</b> · 예산의 65%</div>
      </div>

      <!-- Memo -->
      <div class="memo-wrap">
        <input class="memo-input" placeholder="메모 추가 (선택)" value="점심 식사">
      </div>

      <div class="div"></div>

      <!-- Category -->
      <div class="cat-section">
        <div class="section-label">카테고리</div>
        <div class="cat-strip">
          <div class="cat-chip selected"><span class="emoji">🍜</span> 식비</div>
          <div class="cat-chip"><span class="emoji">🚕</span> 교통</div>
          <div class="cat-chip"><span class="emoji">🏠</span> 주거</div>
          <div class="cat-chip"><span class="emoji">💡</span> 공과금</div>
          <div class="cat-chip"><span class="emoji">🛒</span> 쇼핑</div>
          <div class="cat-chip"><span class="emoji">🎬</span> 여가</div>
          <div class="cat-chip"><span class="emoji">💊</span> 의료</div>
          <div class="cat-chip"><span class="emoji">···</span> 더보기</div>
        </div>
      </div>

      <div class="div"></div>

      <!-- Account row -->
      <div class="meta-row">
        <div class="meta-icon">
          <svg viewBox="0 0 24 24">
            <rect x="2" y="5" width="20" height="14" rx="2"/>
            <line x1="2" y1="10" x2="22" y2="10"/>
          </svg>
        </div>
        <div class="meta-label">계좌</div>
        <div class="meta-value">KB 급여통장</div>
        <div class="meta-chev">›</div>
      </div>

      <!-- Keypad -->
      <div class="keypad">
        <button class="key">1</button>
        <button class="key">2</button>
        <button class="key">3</button>
        <button class="key">4</button>
        <button class="key">5</button>
        <button class="key">6</button>
        <button class="key">7</button>
        <button class="key">8</button>
        <button class="key">9</button>
        <button class="key small">00</button>
        <button class="key">0</button>
        <button class="key icon">
          <svg viewBox="0 0 24 24">
            <path d="M3 12l5-7h13v14H8z"/>
            <line x1="12" y1="9" x2="17" y2="15"/>
            <line x1="17" y1="9" x2="12" y2="15"/>
          </svg>
        </button>
      </div>

      <!-- Save -->
      <div class="save-wrap">
        <button class="save-btn">
          저장하기
          <span style="opacity:0.6; font-weight:500; font-size:14px;">· 12,500원</span>
        </button>
        <div class="save-hint">저장 후 <b>연속 입력</b>하려면 길게 누르세요</div>
        <div class="home-indicator"></div>
      </div>

    </div>
  </div>
</body>
</html>
